name: Weekly Support Program Scrapper
on:
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:

jobs:
  scrape-and-analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      # [핵심] 여기서 requirements.txt를 설치하라고 강제로 명령합니다!
      - name: Install dependencies
        run: pip install -r requirements.txt
        
      - name: Run Scraper and AI analysis
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python scraper.py
